<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harun Or Rashid | The Blue Ring's Shadow Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Orbitron:wght@400;900&family=Inter:wght@300;400;600&display=swap');
        :root { --neon-blue: #00f2ff; --neon-gold: #ffaa00; --bg: #03050a; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; line-height: 1.8; overflow-x: hidden; }
        .bg-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 20% 30%, #001f3f 0%, transparent 40%), radial-gradient(circle at 80% 70%, #1a0f00 0%, transparent 40%); opacity: 0.6; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        nav { padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); letter-spacing: 2px; font-size: 14px; }
        
        /* Responsive Hero Section */
        .hero { display: flex; flex-direction: row; gap: 40px; padding: 80px 0; align-items: center; }
        .book-frame { flex: 1; max-width: 400px; }
        .book-frame img { width: 100%; height: auto; box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 20px rgba(0,242,255,0.2); border-radius: 4px; }
        .hero-text { flex: 1.2; }
        h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; line-height: 1; margin: 0; color: #fff; }
        .tagline { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); margin: 15px 0; letter-spacing: 3px; font-size: 1rem; }
        .buy-box { background: var(--glass); padding: 30px; border-radius: 4px; border: 1px solid rgba(0,242,255,0.1); margin-top: 30px; }
        .price { font-size: 2.2rem; color: var(--neon-gold); font-family: 'Orbitron', sans-serif; font-weight: 900; }
        .btn { background: var(--neon-gold); color: #000; padding: 18px 40px; text-decoration: none; font-family: 'Orbitron', sans-serif; font-weight: 900; display: inline-block; margin-top: 15px; transition: 0.3s; width: 100%; text-align: center; box-sizing: border-box; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .hero { flex-direction: column; text-align: center; padding: 40px 0; }
            h1 { font-size: 2.5rem; }
            .book-frame { max-width: 280px; margin: 0 auto; }
            .logo { font-size: 12px; }
        }

        section { padding: 60px 0; }
        .sec-title { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); letter-spacing: 2px; font-size: 0.8rem; margin-bottom: 20px; }
        .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
        .detail-item { background: var(--glass); padding: 15px; border: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        footer { padding: 40px 0; background: #010204; font-size: 11px; color: #555; text-align: center; border-top: 1px solid #111; }
    </style>
</head>
<body>
    <div class="bg-effect"></div>
    <div class="container">
        <nav><div class="logo">NEON RAIN PRESS</div></nav>
        <section class="hero">
            <div class="book-frame">
                <img src="cover.jpg" alt="The Blue Ring's Shadow">
            </div>
            <div class="hero-text">
                <div class="tagline">THE FALL OF KANE: BOOK ONE</div>
                <h1>THE BLUE RING'S SHADOW</h1>
                <div class="buy-box">
                    <div class="price">$2.99</div>
                    <div style="font-size: 12px; opacity: 0.7;">LIVE ON AMAZON KDP</div>
                    <a href="https://www.amazon.com/dp/B0GSMZBDK8" class="btn">BUY ON AMAZON</a>
                </div>
            </div>
        </section>
        <section>
            <div class="sec-title">// PUBLICATION DETAILS</div>
            <div class="details-grid">
                <div class="detail-item"><b>GENRE</b>Neo-Noir Thriller</div>
                <div class="detail-item"><b>FORMAT</b>Kindle eBook</div>
                <div class="detail-item"><b>LENGTH</b>270 Pages</div>
                <div class="detail-item"><b>ASIN</b>B0GSMZBDK8</div>
            </div>
        </section>
    </div>

    <footer>
        © 2026 HARUN OR RASHID | ALL RIGHTS RESERVED
        <br>
        Contact: <a href="mailto:kemon8784@gmail.com">kemon8784@gmail.com</a>
    </footer>

</body>
</html>
